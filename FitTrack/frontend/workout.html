<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTrack — Treinos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><span class="logo-icon">💪</span><span class="logo-text">FitTrack</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="workout.html"   class="nav-item" data-page="workout"><span class="nav-icon">🏋️</span> Treinos</a>
      <a href="nutrition.html" class="nav-item" data-page="nutrition"><span class="nav-icon">🥗</span> Nutrição</a>
      <a href="profile.html"   class="nav-item" data-page="profile"><span class="nav-icon">👤</span> Perfil</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user"></div>
      <button class="btn btn-outline btn-sm" onclick="logout()">Sair</button>
    </div>
  </aside>

  <div class="app-layout">
    <main class="main-content">
      <div class="mobile-topbar">
        <div class="logo"><span class="logo-icon">💪</span><span class="logo-text">FitTrack</span></div>
        <button class="hamburger" id="hamburger">☰</button>
      </div>

      <div class="page-header">
        <div>
          <h1 class="page-title">Treinos</h1>
          <p class="page-subtitle">Regista e acompanha os teus treinos</p>
        </div>
        <button class="btn btn-primary" onclick="showModal('modal-new-workout')">+ Novo Treino</button>
      </div>

      <div class="grid-2" style="align-items:start;">
        <!-- Workout List -->
        <div>
          <div id="workout-list" class="workout-list">
            <div class="empty-state">
              <div class="empty-icon">🏋️</div>
              <p>A carregar treinos...</p>
            </div>
          </div>
        </div>

        <!-- Workout Detail -->
        <div id="workout-detail" class="card hidden">
          <div id="workout-detail-content"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal: New Workout -->
  <div class="modal-overlay" id="modal-new-workout">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Novo Treino</span>
        <button class="modal-close" onclick="hideModal('modal-new-workout')">✕</button>
      </div>
      <form onsubmit="handleCreateWorkout(event)">
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="new-workout-date">
        </div>
        <div class="form-group">
          <label>Notas (opcional)</label>
          <input type="text" id="new-workout-notas" placeholder="Ex: Peito e tríceps">
        </div>
        <div class="error-msg" id="workout-create-error"></div>
        <div style="display:flex;gap:10px;margin-top:4px;">
          <button type="button" class="btn btn-outline" onclick="hideModal('modal-new-workout')">Cancelar</button>
          <button type="submit" class="btn btn-primary" style="flex:1;">Criar Treino</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Add Exercise -->
  <div class="modal-overlay" id="modal-add-exercise">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Adicionar Exercício</span>
        <button class="modal-close" onclick="hideModal('modal-add-exercise')">✕</button>
      </div>
      <form onsubmit="handleAddExercicio(event)">
        <div class="form-group">
          <label>Nome do Exercício</label>
          <input type="text" id="ex-nome" required placeholder="Ex: Supino plano">
        </div>
        <div class="form-group">
          <label>Músculo Trabalhado</label>
          <input type="text" id="ex-musculo" placeholder="Ex: Peitoral">
        </div>
        <div class="error-msg" id="exercise-error"></div>
        <div style="display:flex;gap:10px;margin-top:4px;">
          <button type="button" class="btn btn-outline" onclick="hideModal('modal-add-exercise')">Cancelar</button>
          <button type="submit" class="btn btn-primary" style="flex:1;">Adicionar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Add Serie -->
  <div class="modal-overlay" id="modal-add-serie">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Adicionar Série</span>
        <button class="modal-close" onclick="hideModal('modal-add-serie')">✕</button>
      </div>
      <form onsubmit="handleAddSerie(event)">
        <div class="form-row">
          <div class="form-group">
            <label>Repetições</label>
            <input type="number" id="serie-reps" required min="1" placeholder="10">
          </div>
          <div class="form-group">
            <label>Peso (kg)</label>
            <input type="number" id="serie-peso" step="0.5" min="0" placeholder="50">
          </div>
        </div>
        <div class="error-msg" id="serie-error"></div>
        <div style="display:flex;gap:10px;margin-top:4px;">
          <button type="button" class="btn btn-outline" onclick="hideModal('modal-add-serie')">Cancelar</button>
          <button type="submit" class="btn btn-primary" style="flex:1;">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/workout.js"></script>
</body>
</html>
